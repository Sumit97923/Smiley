</head>
<body class="h-screen w-screen flex items-center justify-center p-2 text-slate-100 font-sans">

    <div id="main-card" class="w-full max-w-xl bg-slate-900/95 backdrop-blur-lg rounded-2xl shadow-2xl flex flex-col h-[96vh] max-h-[820px] overflow-hidden border border-slate-800">
        
        <header class="bg-slate-800/60 p-4 flex justify-between items-center border-b border-slate-800">
            <div>
                <!-- 🌟 Branding Updated to Smiley Chat -->
                <h1 class="font-black text-xl tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-red-400 to-purple-400">Smiley Chat</h1>
                <p class="text-xs text-slate-400 flex gap-2 items-center mt-1">
                    <span class="inline-block w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></span>
                    <span class="text-emerald-400 font-mono">Status: Engines Synchronized</span> 
                </p>
            </div>
            <select id="call-mode" class="bg-slate-800 text-xs rounded p-1 text-white border border-slate-700 outline-none">
                <option value="video"> 📹 Video + 📞Audio</option>
                <option value="audio">📞 Audio Only</option>
            </select>
        </header>
        
        <section id="status-banner" class="bg-slate-950/80 text-cyan-400 text-center py-2 text-xs font-mono border-b border-slate-800">
             Press Find Partner to start ⚡
        </section>

        <section id="video-grid" class="grid grid-cols-2 gap-2 p-2 bg-black/40 border-b border-slate-800">
            <div class="relative bg-slate-950 rounded-xl overflow-hidden h-40 border border-slate-800">
                <video id="local-video" autoplay playsinline muted class="w-full h-full object-cover" style="transform: scaleX(-1);"></video>
                <div id="audio-only-local" class="hidden absolute inset-0 flex items-center justify-center bg-slate-900 text-slate-400 text-xs">🎤 Mic Active</div>
                <span class="absolute bottom-1.5 left-1.5 bg-black/60 text-slate-300 text-[10px] px-2 py-0.5 rounded-md">You</span>
            </div>
            <div class="relative bg-slate-950 rounded-xl overflow-hidden h-40 border border-slate-800">
                <video id="remote-video" autoplay playsinline class="w-full h-full object-cover"></video>
                <div id="audio-only-remote" class="hidden absolute inset-0 flex items-center justify-center bg-slate-900 text-slate-400 text-xs">🔊 Stranger Connected</div>
                <span class="absolute bottom-1.5 left-1.5 bg-black/60 text-slate-300 text-[10px] px-2 py-0.5 rounded-md">Stranger</span>
            </div>
        </section>

        <section id="messages-container" class="flex-1 p-4 overflow-y-auto chat-scroll flex flex-col gap-3 bg-slate-950/10"></section>

         <div id="reply-preview-box" class="hidden px-4 py-2 bg-slate-950/60 border-t border-slate-800 text-xs text-slate-300 flex justify-between items-center">
            <div>
                <span class="font-bold text-cyan-400">Replying to: </span>
                <span id="reply-preview-text" class="italic">Message context...</span>
            </div>
            <button onclick="cancelReply()" class="text-red-400 font-bold hover:text-red-300">✕</button>
         </div>

         <div id="typing-indicator" class="hidden px-4 py-1.5 text-xs text-cyan-400 font-medium italic bg-slate-950/40 flex items-center gap-1.5 border-t border-slate-800/40">
            <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce"></span>
            <span>Stranger is typing...</span>
         </div>
        
         <section class="px-3 py-1.5 bg-slate-950/50 flex gap-3 border-t border-slate-800 overflow-x-auto text-sm">
             <button onclick="insertEmoji('😂')" class="hover:scale-125 transition">😂</button>
             <button onclick="insertEmoji('🔥')" class="hover:scale-125 transition">🔥</button>
             <button onclick="insertEmoji('😍')" class="hover:scale-125 transition">😍</button>
             <button onclick="insertEmoji('❤️')" class="hover:scale-125 transition">❤️</button>
             <button onclick="insertEmoji('👍')" class="hover:scale-125 transition">👍</button>
             <button onclick="insertEmoji('💕')" class="hover:scale-125 transition">💕</button>
             <button onclick="insertEmoji('😘')" class="hover:scale-125 transition">😘</button>
             <button onclick="insertEmoji('👌')" class="hover:scale-125 transition">👌</button>
             <button onclick="insertEmoji('😜')" class="hover:scale-125 transition">😜</button>
             <button onclick="insertEmoji('😁')" class="hover:scale-125 transition">😁</button>
             <button onclick="insertEmoji('🤞')" class="hover:scale-125 transition">🤞</button>
         </section>
    
        <footer class="p-3 bg-slate-900/90 border-t border-slate-800 flex items-center gap-2">
            <button id="action-btn" onclick="toggleSearch()" class="px-4 py-3.5 bg-gray-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-sm transition shadow-md whitespace-nowrap">🔍 Find Partner</button>
            <input id="chat-input" type="text" placeholder="Type text..." oninput="handleTyping()" onkeypress="handleKey(event)" class="flex-1 px-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl outline-none text-sm text-slate-100 focus:border-cyan-500">
            <button id="voice-btn" onclick="toggleVoiceNote()" class="px-3.5 py-3.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl text-lg border border-slate-700">🎙️</button>
            <button id="send-btn" onclick="sendMsg()" class="px-5 py-3.5 bg-gray-600 hover:bg-emerald-700 text-white font-bold rounded-xl text-sm shadow-md">Send</button>
        </footer>
        
    </div>

    <script>
        const socket = io();
        let localStream, peerConnection, isConnected = false, isSearching = false;
        let mediaRecorder, audioChunks = [], isRecordingVoice = false;
        let typingTimeout;
        let remoteStream = null;

        let selectedReplyMsgId = null;
        let selectedEditMsgId = null;

        const configuration = {
          iceServers: [
              { urls: "stun:stun.relay.metered.ca:80" },
              {
                urls: "turn:global.relay.metered.ca:80",
                username: "c82e54e33431753c971307b9",
                credential: "WNGRoCt9akSdjdCk",
              },
              {
                urls: "turn:global.relay.metered.ca:80?transport=tcp",
                username: "c82e54e33431753c971307b9",
                credential: "WNGRoCt9akSdjdCk",
              },
              {
                urls: "turn:global.relay.metered.ca:443",
                username: "c82e54e33431753c971307b9",
                credential: "WNGRoCt9akSdjdCk",
              },
              {
                urls: "turns:global.relay.metered.ca:443?transport=tcp",
                username: "c82e54e33431753c971307b9",
                credential: "WNGRoCt9akSdjdCk",
              },
          ],
        };

        const actionBtn = document.getElementById("action-btn");
        const statusBanner = document.getElementById("status-banner");
        const messagesContainer = document.getElementById("messages-container");
        const typingIndicator = document.getElementById("typing-indicator");
        const chatInput = document.getElementById("chat-input");
        const sendBtn = document.getElementById("send-btn");
        const replyPreviewBox = document.getElementById("reply-preview-box");
        const replyPreviewText = document.getElementById("reply-preview-text");

        async function startMedia() {
            const useVideo = (document.getElementById("call-mode").value === "video");
            document.getElementById("audio-only-local").style.display = useVideo ? "none" : "flex";
            document.getElementById("audio-only-remote").style.display = useVideo ? "none" : "flex";
            
            try {
                if(!localStream) {
                    localStream = await navigator.mediaDevices.getUserMedia({ 
                        video: useVideo ? { width: 640, height: 480, frameRate: 30 } : false, 
                        audio: true 
                    });
                    document.getElementById('local-video').srcObject = localStream;
                } else {
                    localStream.getVideoTracks().forEach(track => track.enabled = useVideo);
                }
                
                if (peerConnection) {
                    localStream.getTracks().forEach(t => {
                        const s = peerConnection.getSenders().find(snd => snd.track && snd.track.kind === t.kind);
                        if (s) s.replaceTrack(t);
                    });
                }
            } catch (err) { 
                console.warn("Retrying with flexible constraints...", err);
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: useVideo, audio: true });
                    document.getElementById('local-video').srcObject = localStream;
                } catch(e) {
                    alert("Please turn on Camera and Mic permission manually from site settings!");
                }
            }
        }
        
        document.getElementById("call-mode").addEventListener("change", startMedia);
        window.addEventListener('DOMContentLoaded', startMedia);

        function toggleSearch() {
            if (!isSearching && !isConnected) {
                isSearching = true;
                actionBtn.innerText = "🛑 Stop";
                actionBtn.className = "px-4 py-3.5 bg-red-600 text-white font-bold rounded-xl text-sm";
                statusBanner.innerText = "Scanning active channels...";
                socket.emit('find-partner', { mode: document.getElementById("call-mode").value });
            } else { resetConnection(); socket.emit('skip'); }
        }

        socket.on('matched', (data) => {
            isConnected = true; isSearching = false;
            actionBtn.innerText = "❌ Skip";
            actionBtn.className = "px-4 py-3.5 bg-amber-600 text-white font-bold rounded-xl text-sm";
            statusBanner.innerText = "🎯 Partner linked! Communications active.";
            messagesContainer.innerHTML = `<div class="text-xs text-center text-slate-600">Secure link established.</div>`;
            createPeerConnection(data.isInitiator);
        });

        function setVideoBitrate(sdp) {
            return sdp.replace(/a=mid:video\r\n/g, 'a=mid:video\r\nb=AS:1500\r\n');
        }

        function createPeerConnection(isInitiator) {
            if (peerConnection) peerConnection.close();
            peerConnection = new RTCPeerConnection(configuration);
            
            remoteStream = new MediaStream();
            document.getElementById('remote-video').srcObject = remoteStream;

            if (localStream) {
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            }
            
            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remote-video');
                event.streams[0].getTracks().forEach(track => {
                    if (!remoteStream.getTracks().find(t => t.id === track.id)) {
                        remoteStream.addTrack(track);
                    }
                });
                remoteVideo.play().catch(e => console.log("Autoplay handled."));
            };

            peerConnection.onicecandidate = (e) => { 
                if (e.candidate) socket.emit('signal', { candidate: e.candidate }); 
            };

            if (isInitiator) {
                peerConnection.onnegotiationneeded = async () => {
                    try {
                        let offer = await peerConnection.createOffer();
                        offer.sdp = setVideoBitrate(offer.sdp);
                        await peerConnection.setLocalDescription(offer);
                        socket.emit('signal', { offer: offer });
                    } catch(err) { console.error(err); }
                };
            }
        }

        socket.on('signal', async (d) => {
            if (!peerConnection) return;
            try {
                if (d.offer) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(d.offer));
                    let a = await peerConnection.createAnswer();
                    a.sdp = setVideoBitrate(a.sdp);
                    await peerConnection.setLocalDescription(a);
                    socket.emit('signal', { answer: a });
                } else if (d.answer) { 
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(d.answer)); 
                } else if (d.candidate) { 
                    await peerConnection.addIceCandidate(new RTCIceCandidate(d.candidate)); 
                }
            } catch (err) { console.log("Signal tracking error:", err); }
        });

        function sendMsg() {
            if (chatInput.value.trim() && isConnected) {
                const val = chatInput.value;
                
                if (selectedEditMsgId) {
                    socket.emit('edit-message', { msgId: selectedEditMsgId, newText: val });
                    updateLocalMsgUI(selectedEditMsgId, val);
                    cancelEdit();
                } else {
                    const uniqueMsgId = 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
                    const messagePayload = {
                        msgId: uniqueMsgId,
                        text: val,
                        replyToId: selectedReplyMsgId,
                        replyToText: selectedReplyMsgId ? document.getElementById(`text-${selectedReplyMsgId}`).innerText : null
                    };
                    
                    appendMsg(messagePayload, 'me');
                    socket.emit('text-message', messagePayload);
                    cancelReply();
                }
                
                chatInput.value = '';
                socket.emit('typing-state', false);
            }
        }

        socket.on('text-message', (messagePayload) => {
            appendMsg(messagePayload, 'stranger');
        });

        socket.on('edit-message', (data) => {
            updateLocalMsgUI(data.msgId, data.newText);
        });

        socket.on('delete-message', (data) => {
            const textElement = document.getElementById(`text-${data.msgId}`);
            if (textElement) {
                textElement.innerText = "🗑️ This message was deleted";
                textElement.classList.add("italic", "text-slate-500");
                const actionsBlock = document.getElementById(`actions-${data.msgId}`);
                if (actionsBlock) actionsBlock.remove();
            }
        });

        function initiateReply(msgId, originalText) {
            selectedReplyMsgId = msgId;
            selectedEditMsgId = null;
            sendBtn.innerText = "Send";
            replyPreviewText.innerText = originalText.length > 35 ? originalText.substring(0,35) + "..." : originalText;
            replyPreviewBox.classList.remove("hidden");
            chatInput.focus();
        }

        function cancelReply() {
            selectedReplyMsgId = null;
            replyPreviewBox.classList.add("hidden");
        }

        function initiateEdit(msgId, currentText) {
            selectedEditMsgId = msgId;
            selectedReplyMsgId = null;
            replyPreviewBox.classList.add("hidden");
            chatInput.value = currentText;
            sendBtn.innerText = "✍️ Edit";
            chatInput.focus();
        }

        function cancelEdit() {
            selectedEditMsgId = null;
            sendBtn.innerText = "Send";
            chatInput.value = '';
        }

        function requestDelete(msgId) {
            if(confirm("Delete this message?")) {
                socket.emit('delete-message', { msgId: msgId });
                const textElement = document.getElementById(`text-${msgId}`);
                if (textElement) {
                    textElement.innerText = "🗑️ You deleted this message";
                    textElement.classList.add("italic", "text-slate-400");
                    const actionsBlock = document.getElementById(`actions-${msgId}`);
                    if (actionsBlock) actionsBlock.remove();
                }
            }
        }

        function updateLocalMsgUI(msgId, newText) {
            const textElement = document.getElementById(`text-${msgId}`);
            if (textElement) {
                textElement.innerText = newText + " (edited)";
            }
        }

        function handleTyping() {
            if (!isConnected) return;
            socket.emit('typing-state', true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing-state', false);
            }, 1800);
        }

        socket.on('typing-state', (isTyping) => {
            if (isTyping) { typingIndicator.classList.remove("hidden"); }
            else { typingIndicator.classList.add("hidden"); }
        });

        function insertEmoji(emoji) {
            chatInput.value += emoji;
            chatInput.focus();
            handleTyping();
        }

        async function toggleVoiceNote() {
            if (!isConnected) return;
            const voiceBtn = document.getElementById("voice-btn");
            if (!isRecordingVoice) {
                try {
                    const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(audioStream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const r = new FileReader(); r.readAsDataURL(audioBlob);
                        r.onloadend = () => {
                            socket.emit('voice-note', r.result);
                            appendVoiceElement(r.result, 'me');
                        }
                    };
                    mediaRecorder.start(); isRecordingVoice = true;
                    voiceBtn.innerText = "🛑"; voiceBtn.className = "px-3.5 py-3.5 bg-red-600 text-white rounded-xl text-lg animate-pulse";
                } catch (err) { alert("Mic connection needed!"); }
            } else {
                mediaRecorder.stop(); isRecordingVoice = false;
                voiceBtn.innerText = "🎙️"; voiceBtn.className = "px-3.5 py-3.5 bg-slate-800 text-slate-300 rounded-xl text-lg border border-slate-700";
            }
        }

        socket.on('voice-note', (base64Audio) => appendVoiceElement(base64Audio, 'stranger'));

        function appendVoiceElement(data, sender) {
            let box = document.createElement('div');
            box.className = `max-w-[75%] p-3 rounded-xl flex flex-col gap-1.5 ${sender==='me'?'bg-indigo-600 self-end':'bg-slate-800 self-start'}`;
            let audio = document.createElement('audio'); audio.src = data; audio.controls = true;
            audio.className = "w-48 h-8 filter invert contrast-125 rounded-md";
            box.appendChild(audio); messagesContainer.appendChild(box);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        socket.on('partner-disconnected', () => {
            let d = document.createElement('div');
            d.className = "self-center bg-red-950/40 text-xs px-3 py-1 rounded text-red-400 italic";
            d.innerText = "Stranger left the room.";
            messagesContainer.appendChild(d);
            resetConnection();
        });

        function resetConnection() {
            if (peerConnection) peerConnection.close();
            document.getElementById('remote-video').srcObject = null;
            remoteStream = null;
            isConnected = false; isSearching = false;
            typingIndicator.classList.add("hidden");
            cancelReply();
            cancelEdit();
            actionBtn.innerText = "🔍 Find Partner";
            actionBtn.className = "px-4 py-3.5 bg-indigo-600 text-white font-bold rounded-xl text-sm";
            statusBanner.innerText = "Connection reset.";
        }

        function appendMsg(payload, sender) {
            const msgId = payload.msgId;
            const msgText = payload.text;

            let mainWrapper = document.createElement('div');
            mainWrapper.id = `bubble-${msgId}`;
            mainWrapper.className = `max-w-[75%] flex flex-col gap-1 group ${sender === 'me' ? 'self-end items-end' : 'self-start items-start'}`;

            if (payload.replyToId && payload.replyToText) {
                let quoteBox = document.createElement('div');
                quoteBox.className = "text-[11px] opacity-70 bg-black/30 px-2 py-1 rounded-lg border-l-2 border-cyan-400 max-w-full truncate mb-[-4px]";
                quoteBox.innerText = `⤺ ${payload.replyToText}`;
                mainWrapper.appendChild(quoteBox);
            }

            let bubble = document.createElement('div');
            bubble.className = `px-4 py-2 rounded-xl text-sm relative break-words w-full ${sender === 'me' ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-white'}`;
            
            let textSpan = document.createElement('span');
            textSpan.id = `text-${msgId}`;
            textSpan.innerText = msgText;
            bubble.appendChild(textSpan);

            let actionsDiv = document.createElement('div');
            actionsDiv.id = `actions-${msgId}`;
            actionsDiv.className = "text-[10px] text-slate-400 mt-1 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-150 cursor-pointer select-none justify-end";
            
            actionsDiv.innerHTML += `<span onclick="initiateReply('${msgId}', '${msgText.replace(/'/g, "\\'")}')" class="hover:text-cyan-400">↩ Reply</span>`;
            
            if (sender === 'me') {
                actionsDiv.innerHTML += `<span onclick="initiateEdit('${msgId}', '${msgText.replace(/'/g, "\\'")}')" class="hover:text-yellow-400">✏️ Edit</span>`;
                actionsDiv.innerHTML += `<span onclick="requestDelete('${msgId}')" class="hover:text-red-400">🗑️ Delete</span>`;
            }

            mainWrapper.appendChild(bubble);
            mainWrapper.appendChild(actionsDiv);
            
            messagesContainer.appendChild(mainWrapper);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function handleKey(e) { if(e.key === "Enter") sendMsg(); }
    </script>
</body>
